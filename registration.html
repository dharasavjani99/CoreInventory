<html>
    <head>
        <title>Shopping Website</title>
        <link rel="stylesheet" href="5a.css">
        <script src="5a1.js"></script>
    </head>
    <body>
        <div class="header">
            <h1 class="title" style="font-family: 'Segoe UI', sans-serif;">House of Heels</h1>
        </div>
        <h1 class="title" style="font-family: 'Segoe UI', sans-serif; text-align: center;"> Registration Form </h1>
        <br>
        <div class="form-container">
            <form onsubmit="validateForm()">
                Name: <input type="text" id="name"><br><br>
                Email: <input type="text" id="email"><br><br>
                Password: <input type="password" id="pass"><br><br>
                Confirm Password: <input type="password" id="cpass"><br><br>
                Phone Number: <input type="text" id="phone"><br><br>
                Address: <input type="text" id="address"><br><br>
                <input type="submit" value="Register" style="background-color: rgb(39, 39, 175); color: white;">
            </form>
        </div>
        <br>
        <div style="text-align: center; margin-top: 20px;">
            <a href="5a_Shopping_Website.html" class="welcome-btn"> Home </a>
        </div>
    </body>
